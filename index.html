<script>

"use strict";

const bg = document.getElementById('bg');
const bctx = bg.getContext('2d', {alpha: false});
const canvas = document.getElementById('c');
const desc = document.getElementById('desc');
const ctx = canvas.getContext('2d');
let screen = null;
let scale = 1;
updateCanvasSize();

const fonts = [
	"20px 'Nokora'",
	"16px 'Muol'",
	"17px 'Fasthand'",
	"18px 'Bokor'",
	"20px 'Metalchrieng'"];

const khgrid = [
	["ក", "ខ", "គ", "ឃ", "ង"],
	["ច", "ឆ", "ជ", "ឈ", "ញ"],
	["ដ", "ឋ", "ឌ", "ឍ", "ណ"],
	["ត", "ថ", "ទ", "ធ", "ន"],
	["ប", "ផ", "ព", "ភ", "ម"],
	["ស", "ហ", "យ", "រ"],
	["ល", "ឡ", "អ", "វ"]
];

const ipa = [
	["k", "kʰ", "k", "kʰ", "ŋ"],
	["c", "cʰ", "c", "cʰ", "ɲ"],
	["ɗ", "tʰ", "ɗ", "tʰ", "n"],
	["t", "tʰ", "t", "tʰ", "n"],
	["ɓ", "pʰ", "p", "pʰ", "m"],
	["s", "h", "y", "r"],
	["l", "l", "a", "v"]
];

const ipav = [
	["ɑɑ", "ɔɔ"],
];

const kh_rownames = [
	"Throat", "Palatal", "Retroflex", "Dental", "Bilabial", "Misc", "Misc2"
];

function kh_desc(row, col){
	let text = `<h3>${khgrid[row][col]} /${ipa[row][col]}${ipav[0][kh_isfirst(row, col)?0:1]}/ ${kh_isfirst(row, col) ? "First Series" : "Second Series"}</h3> Row ${row + 1} (${kh_rownames[row]}), Col ${col+1}. ${kh_isasp(row, col) ? "Aspirated" : "Unaspirated"}`;
	return text;
}

const s = {
	rects: null,
	rows: 8,
	cols: 8,
	tile: 32,
	atlas: null,
	actx: null,
	newsprite: function(){
		const temp = this.rects.indexOf(false);
		this.rects[temp] = true;
		return temp;
	},
	populate: function(){
		this.atlas = new OffscreenCanvas(this.tile*this.cols, this.tile*this.rows);
		this.actx = this.atlas.getContext('2d');
		this.actx.imageSmoothingEnabled = false;
		this.rects = new Array(this.rows * this.cols).fill(false);
		console.log(this.rects);
	},
};
s.populate();

function kh_isnasal(row, col){
	return col == 4 && row <= 4;
}

function kh_tonasal(b){
	if(b.row <= 4)
		b.col = 4;
	b.rect.color = "#ddd";
}
function kh_dec(b){
	b.rect.color = "#008";
	--b.col;
	kh_tolegal(b);
}
function kh_tolegal(b){
	if(b.row < 0)
		b.row = 0;
	else if(b.row > khgrid.length-1)
		b.row = khgrid.length-1;
	if(b.col < 0)
		b.col = 0;
	else if(b.col > khgrid[b.row].length-1)
		b.col = khgrid[b.row].length-1;
}
function kh_nextfont(b){
	++b.font;
	if(b.font > fonts.length - 1)
		b.font = 0;
}
function kh_incrow(b){
	b.rect.color = "#883";
	++b.row;
	kh_tolegal(b);
}
function kh_toasp(b){
	if(b.row <= 4){
		if(b.col < 3 && b.col%2 == 0){
			b.rect.color = "#08f";
			++b.col;
		}
	}
}
function kh_isasp(row, col){
	return row <= 4 && col < 4 && col%2 == 1;
}
function kh_isfirst(row, col){
	return (row <= 5 && col < 2) || (row == 2 && col == 4) || (row == 6 && col != 0 && col != 3)
}

function particle(x, y, w, h, color, vx, vy, life){
	this.vx = vx;
	this.vy = vy;
	this.life = life;
	this.rect = new rect(x, y, w, h, color);
	this.draw = function(){
		ctx.globalAlpha = this.life/30;
		ctx.fillStyle = this.rect.color;
		ctx.fillRect(this.rect.x, this.rect.y, this.rect.w, this.rect.h);
		ctx.globalAlpha = 1;
	}
	this.update = function(){
		this.rect.x += this.vx;
		this.rect.y += this.vy;
		--this.life;
	}
}

let particles = [
	new particle(0, 0, 5, 5, "#F40", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#FA0", -0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#C90", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#aa0", -0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#880", 0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#F50", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#Fb0", -0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#C90", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#aa0", -0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#880", 0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#F40", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#FA0", -0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#C90", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#aa0", -0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#880", 0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#F50", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#F40", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#FA0", -0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#C90", 0.1, -0.1, 10),
	new particle(0, 0, 5, 5, "#aa0", -0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#880", 0.2, -0.1, 10),
	new particle(0, 0, 5, 5, "#F50", 0.1, -0.1, 10),
];

function tpath(x, y, w, h, transf, ex, ey){
	this.rect = new rect(x, y, w, h);
	this.transf = transf;
	this.ex = ex;
	this.ey = ey;
	this.draw = function(){
		this.rect.draw();
	}
}

let paths = [
	new tpath(160, 10, 32, 32, kh_isnasal, 280, 30),
	new tpath(140, 130, 32, 32, kh_isasp, 270, 100)
];

function rect(x, y, w, h, color){
	this.x = x;
	this.y = y;
	this.w = w;
	this.h = h;
	this.color = color;
	this.draw = function(){
		ctx.strokeStyle = "#F00";
		ctx.setLineDash([4, 2]);
		ctx.strokeWidth = 3;
		ctx.strokeRect(this.x, this.y, this.w, this.h);
	}
	this.intersects = function(x, y, w=1, h=1){
		if(!x || !y)
			return false;
		return x + w >= this.x && x <= this.x + this.w &&
			y + h >= this.y && y <= this.y + this.h;
	}
}

const anim = [30, 90];

function khc(row, col, font, x, y, w, h){
	this.row = row;
	this.col = col;
	this.font = font;
	this.a = 0;
	this.vx = 0;
	this.vy = 0;
	this.sprite;
	this.frame = 0;
	this.anim;
	this.phase = 0;
	this.path = null;
	this.rect = new rect(x, y, w, h, kh_isnasal(row, col) ? "#f70" : "#909");
	this.generate = function(){
		if(this.sprite === undefined)
			this.sprite = s.newsprite();
		s.actx.clearRect(s.tile * (this.sprite % s.cols), s.tile * Math.floor(this.sprite/s.rows), s.tile, s.tile);
		console.log(this.sprite);
		s.actx.save();
		s.actx.translate(s.tile * (this.sprite % s.cols), s.tile * Math.floor(this.sprite/s.rows));
		s.actx.shadowColor = "#000";
		s.actx.shadowBlur = 3;
		const grad = s.actx.createRadialGradient(s.tile/2, s.tile/3, s.tile/4, s.tile/2, s.tile/2, s.tile/2);
		grad.addColorStop(0, this.rect.color);
		grad.addColorStop(1, "#000");
		s.actx.fillStyle = grad;
		s.actx.beginPath()
		s.actx.arc(s.tile/2, s.tile/2, s.tile/2 -2, 0, 2*Math.PI);
		s.actx.fill();
		//s.actx.fillRect(0, 0, s.tile - 8, s.tile - 8);
		s.actx.textBaseline = "middle";
		s.actx.textAlign = "center";
		s.actx.fillStyle = "#000";
		s.actx.font = fonts[this.font];
		s.actx.fillText(khgrid[this.row][this.col], s.tile/2-s.tile/30, s.tile/2+s.tile/30);
		s.actx.fillStyle = "#fff";
		s.actx.fillText(khgrid[this.row][this.col], s.tile/2, s.tile/2);
		s.actx.restore();
		//this.rect.draw();
	};
	this.draw = function(){
		ctx.save();
		ctx.translate(Math.round(this.rect.x+this.rect.w/2), Math.round(this.rect.y+this.rect.h/2));
		if(this.anim == 0){
			this.phase = (-Math.cos(this.frame*Math.PI/anim[0])+1)/2*Math.cos(this.frame*Math.PI/10);
			ctx.rotate(this.a);
			ctx.scale(1-this.phase/2, 1+this.phase/2)
		}else if(this.anim == 1){
			this.phase = (Math.sin(this.frame/this.rect.w*5));
			ctx.translate(0, this.phase*this.rect.h/2);
			ctx.rotate(-this.phase*Math.PI/4);
			ctx.scale(1+this.phase/4, 1-this.phase/4);
		}
		ctx.drawImage(
      s.atlas,
      s.tile*(this.sprite%s.cols), s.tile*Math.floor(this.sprite/s.rows), s.tile, s.tile,
      -this.rect.w/2, -this.rect.h/2, this.rect.w, this.rect.h 
    );
		ctx.restore();
		//this.rect.draw();
	};
	this.update = function(){
		this.rect.x += this.vx;
		this.rect.y += this.vy;
		--this.frame;
		if(this.frame <= 0)
			this.anim = undefined;
		if(this.path){
			this.vx = (this.rect.x < this.path.ex) ? 1 : -1;
			this.vy = (this.rect.y < this.path.ey) ? 1 : -1;
			if(Math.abs(this.rect.x - this.path.ex) < 3 && Math.abs(this.rect.y - this.path.ey) < 3 && Math.abs(this.phase) < 0.1){
			const jump = (Math.sin(this.frame/this.rect.w*5));
				this.anim = undefined;
				this.path = null;
				this.frame = 0;
				this.vx = this.vy = 0;
			}
		}
	}
}

function machine(x, y, w, h, font, label, transf){
	this.rect = new rect(x, y, w, h, "#555");
	this.font = font;
	this.label = label;
	this.frame = 0;
	this.transf = transf;
	this.sprite;
	this.generate = function(){
		if(this.sprite === undefined)
			this.sprite = s.newsprite();
		s.actx.save();
		s.actx.translate(s.tile * (this.sprite % s.cols) + 4, s.tile * Math.floor(this.sprite/s.rows) + 4);
		s.actx.shadowColor = "#000";
		s.actx.shadowBlur = 3;
		s.actx.fillStyle = this.rect.color;
		s.actx.fillRect(0, 0, s.tile - 8, s.tile - 8);
		for(let i=0; i<100; ++i){
			s.actx.fillStyle = `rgb(${100 + Math.random() * 50}, ${100 + Math.random() * 55}, ${50*Math.random()})`;
			let w = (s.tile-8)/4*Math.random();
			let h = (s.tile-8)/4*Math.random();
			let x = (s.tile-8-w)*Math.random()
			let y = (s.tile-8-h)*Math.random()
			s.actx.fillRect(x, y, w, h);
		}
		s.actx.shadowBlur = 3;
		s.actx.textBaseline = "middle";
		s.actx.textAlign = "center";
		s.actx.fillStyle = "#fff";
		s.actx.font = fonts[this.font];
		s.actx.fillText(label, s.tile/2, s.tile/2);
		s.actx.restore();
	};
	this.draw = function(){
		ctx.save();
		const tremor = (-Math.cos(this.frame*Math.PI/anim[0])+1)/2*Math.cos(this.frame*Math.PI/10);
		ctx.translate(this.rect.x+this.rect.w/2, this.rect.y+this.rect.h/2);
		//ctx.rotate(this.a);
		ctx.scale(1-tremor/2, 1+tremor/2)
		ctx.drawImage(
      s.atlas,
      s.tile*(this.sprite%s.cols), s.tile*Math.floor(this.sprite/s.rows), s.tile, s.tile,
      -this.rect.w/2, -this.rect.h/2, this.rect.w, this.rect.h 
    );
		ctx.restore();
		//this.rect.draw();
	};
}

let binis = [
	new khc(0, 0, 0, 20, 20, 32, 32),
	new khc(1, 0, 2, 50, 50, 32, 32),
	new khc(2, 3, 3, 20, 100, 32, 32),
	new khc(0, 4, 1, 10, 50, 32, 32)
];

let machines = [
	new machine(150, 50, 32, 32, 0, ">", kh_tonasal),
	new machine(100, 120, 32, 32, 0, "-", kh_dec),
	new machine(20, 130, 32, 32, 0, "h", kh_toasp),
	new machine(100, 70, 32, 32, 0, ")+", kh_incrow),
	new machine(100, 20, 32, 32, 0, "F+", kh_nextfont),
];

function updateCanvasSize() {
	screen = canvas.getBoundingClientRect();
	scale = canvas.width/screen.width;
}

const game = {
	mobile:
    /Mobi|Android/i.test(navigator.userAgent),
	lastX: null,
	lastY: null,
	x: null,
	y: null,
	mousedown: false,
	cobj: null,
	updateMouse: function(e){
		this.lastX = this.x;
		this.lastY = this.y;
		this.x = (e.clientX - screen.x) * scale;
		this.y = (e.clientY - screen.y) * scale;
	},
	handleMouse: function(e, down){
		this.updateMouse(e);
		this.mousedown = down;
		if(down){
			if(!this.cobj){
				binis.forEach((b) =>{
					if(b.rect.intersects(this.x, this.y)){
						this.cobj = b;
						desc.innerHTML = kh_desc(b.row, b.col);
					}
				});
			}
		}else if(this.cobj){
			paths.forEach((p) =>{
				if(this.cobj.rect.intersects(p.rect.x, p.rect.y, p.rect.w, p.rect.h)){
					this.cobj.path = p;
					this.cobj.anim = 1;
					this.cobj.frame = 200;
				}
			});
			machines.forEach((m) => {
				if(this.cobj.rect.intersects(m.rect.x, m.rect.y, m.rect.w, m.rect.h)){
					m.transf(this.cobj);
					desc.innerHTML = kh_desc(this.cobj.row, this.cobj.col);
					this.cobj.generate();
					particles.forEach((p) =>{
						p.rect.x = this.cobj.rect.x + this.cobj.rect.w * Math.random();
						p.rect.y = this.cobj.rect.y + this.cobj.rect.h * Math.random();
						p.rect.w = 1 + Math.random() * 5;
						p.rect.h = 1 + Math.random() * 5;
						p.vx = 1 * Math.random() - 0.5;
						p.vy = -1 * Math.random();
						p.life = 30 * Math.random() + 30;
					});
					this.cobj.frame = anim[0];
					this.cobj.anim = 0;
				}
			});
			this.cobj = null;
		}
	},
	start: function(){
		window.addEventListener('resize', updateCanvasSize);

		binis.forEach((b) =>{
			b.generate();
		});
		machines.forEach((m) =>{
			m.generate();
		});
		this.generate();

    window.addEventListener('pointermove', (e) => {
			e.preventDefault();           // ← prevents page scroll on mobile
			this.updateMouse(e);
		});
		window.addEventListener('pointerdown', (e) => {
			this.handleMouse(e, true);
    })
    window.addEventListener('pointerup', (e) => {
			this.handleMouse(e, false);
    })
	},
	clear: function(){
		 ctx.clearRect(0, 0, canvas.width, canvas.height);
	},
	update: function() {
		binis.forEach((b) =>{
			b.update();
		});
		particles.forEach((p) =>{
			if(p.life > 0){
				p.update();
			}
		});
		if(this.cobj){
			this.cobj.rect.x = this.x - this.cobj.rect.w/2;
			this.cobj.rect.y = this.y - this.cobj.rect.h + (this.mobile ? -16 : 0);
		}
	},
	generate: function(){
		const ling = bctx.createLinearGradient(0, 0, 0, canvas.height);
		ling.addColorStop(0, "#bcf");
		ling.addColorStop(0.6, "#16c");
		ling.addColorStop(0.63, "#2a1");
		bctx.fillStyle = ling;
		bctx.fillRect(0, 0, bg.width, bg.height);
		for(let i=0; i<900; ++i){
			bctx.save();
			bctx.translate(Math.random()*bg.width, bg.height/2+bg.height/8 + Math.random()*bg.height/2);
			bctx.rotate(Math.random() *Math.PI);
			bctx.fillStyle = `rgb(${50+Math.random()*40}, ${150+Math.random()*100}, ${Math.random()*20})`;
			const w = Math.random() * 5;	
			const h = Math.random() * 5;	
			bctx.fillRect(0, 0, w, h);
			bctx.restore();
		}
	},
	render: function(){
		this.clear();
			machines.forEach((m) => {
			m.draw();
		});
		paths.forEach((p) => {
			p.draw();
		});
		binis.forEach((b) => {
			b.draw();
		});
		particles.forEach((p) =>{
			if(p.life > 0){
				p.draw();
			}
		});
	}
};

;(() => {
	game.start();
  function main(tFrame) {
    game.stopMain = window.requestAnimationFrame(main);
    game.update(tFrame);
		game.render();
  }
  main(); // Start the cycle
})();
</script>
